name: "Validate Gradle Wrapper"

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  validation:
    name: "Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.3.4
      - name: Install JDK
        uses: actions/setup-java@v2
        with:
          distribution: "adopt"
          java-version: 17
      - uses: gradle/wrapper-validation-action@v1
